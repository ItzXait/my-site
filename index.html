<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Лизы ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            background: white;
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 600px;
            margin: 20px;
        }

        .heart {
            font-size: 80px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #ff6b9d;
            font-size: 2.5em;
            margin: 20px 0;
        }

        p {
            color: #666;
            font-size: 1.3em;
            line-height: 1.6;
            margin: 15px 0;
        }

        /* Стили для кнопки */
        .btn-love {
            padding: 18px 50px;
            background: linear-gradient(135deg, #ff6b9d, #ff8e8e);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3em;
            margin-top: 25px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-love:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(255,107,157,0.4);
        }

        .hidden-message {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #fff5f5;
            border-radius: 15px;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="heart">💝</div>
        <h1Хы<3></h1Хы>
        <p>ням</p>
        <p> Я люблю тебя✨</p>

        <!-- Кнопка, которая показывает сообщение -->
        <button class="btn-love" onclick="showMessage()">
            Нажми меня 💖
        </button>

        <div class="hidden-message" id="message">
            <p style="color: #ff6b9d; font-size: 1.5em;">
                Ты самая лучшая! 💖
            </p>
        </div>
    </div>

    <script>
        function showMessage() {
            const msg = document.getElementById('message');
            msg.style.display = 'block';

            // Запускаем сердечки!
            for(let i = 0; i < 30; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '💕';
            heart.style.position = 'fixed';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = '-20px';
            heart.style.animation = `fall ${Math.random() * 2 + 2}s linear`;
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '1000';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 3000);
        }
    </script>

    <style>
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
